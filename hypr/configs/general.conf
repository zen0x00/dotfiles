source = colors.conf

general {
    gaps_in = 10
    gaps_out = 20
    border_size = 2
    col.active_border = $activeBorderColor
    col.inactive_border = rgba(595959aa)
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 12
    rounding_power = 4
    active_opacity = 1
    inactive_opacity = 0.9

    shadow {
        enabled = true
        range = 30
        render_power = 4
        color = rgba(0a0a1299)
        scale = 1.0
    }

    blur {
        enabled = true
        size = 6
        passes = 4
        ignore_opacity = true
        noise = 0.012
        contrast = 0.9
        xray = false
        new_optimizations = true
        special = false
    }
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = true
}

dwindle  {
  pseudotile = true
  force_split = 2
  preserve_split = true
}

master {
  allow_small_split = true
  new_status = master
  new_on_top = off
  new_on_active = before
  drop_at_cursor = on
  always_keep_position = off
}

scrolling {
  fullscreen_on_one_column = true
  column_width = 1
  focus_fit_method = 1
  follow_focus = true
}

