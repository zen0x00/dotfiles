source = ~/.config/hypr/hyprlock-colors.conf

general {
    hide_cursor = true
    grace = 0
    no_fade_in = false
    no_fade_out = false
}

background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 6
    noise = 0.02
    contrast = 0.9
    brightness = 0.6
    color = $bg0
}

input-field {
    monitor =
    size = 280, 48
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.15
    dots_center = true
    outer_color = $fg2
    inner_color = $bg1
    font_color = $fg0
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <span foreground="##$fg2_strip">Password...</span>
    hide_input = false
    rounding = 0
    check_color = $accent
    fail_color = $red
    fail_text = <span foreground="##$red_strip">$FAIL</span>
    fail_transition = 300
    capslock_color = $yellow
    position = 0, -40
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = $fg0
    font_size = 64
    font_family = JetBrainsMono Nerd Font Mono
    position = 0, 120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %B %d"
    color = $fg1
    font_size = 16
    font_family = JetBrainsMono Nerd Font Mono
    position = 0, 60
    halign = center
    valign = center
}
