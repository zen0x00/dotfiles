#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = LANG,en_IN.utf8
env = LC_CTYPE,en_IN.utf8
env = LC_NUMERIC,en_IN.utf8
env = LC_TIME,en_IN.utf8
env = LC_COLLATE,en_IN.utf8
env = LC_MONETARY,en_IN.utf8
env = LC_MESSAGES,en_IN.utf8
env = LC_PAPER,en_IN.utf8
env = LC_NAME,en_IN.utf8
env = LC_ADDRESS,en_IN.utf8
env = LC_TELEPHONE,en_IN.utf8
env = LC_MEASUREMENT,en_IN.utf8
env = LC_IDENTIFICATION,en_IN.utf8

xwayland {
    force_zero_scaling = true
}
