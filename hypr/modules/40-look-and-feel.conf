#####################
### LOOK AND FEEL ###
#####################

source = ~/.config/hypr/colors.conf

general {
    gaps_in = 10
    gaps_out = 20

    border_size = 2
    col.active_border = $active_border
    col.inactive_border = $inactive_border

    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 12
    rounding_power = 4

    active_opacity = 0.92
    inactive_opacity = 0.82
    fullscreen_opacity = 1.0

    dim_inactive = true
    dim_strength = 0.08
    dim_special = 0.12

    shadow {
        enabled = false
    }

    blur {
        enabled = true
        size = 6
        passes = 2
        ignore_opacity = true
        new_optimizations = true
        vibrancy = 0.15
    }
}

animations {
    enabled = true

    bezier = out,  0.16, 1,    0.3,  1
    bezier = back, 0.34, 1.56, 0.64, 1
    bezier = in,   0.65, 0,    0.35, 1

    animation = windows,     1, 3, back,  popin 85%
    animation = windowsOut,  1, 2, in,    popin 95%
    animation = windowsMove, 1, 2, out,   slide

    animation = border,      1, 2, out

    animation = fade,        1, 2, out
    animation = fadeLayers,  1, 2, out

    animation = layers,      1, 2, out,  fade
    animation = layersOut,   1, 1, in,   fade

    animation = workspaces,         1, 3, out, slidefade 20%
    animation = specialWorkspace,   1, 3, out, slidevert
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
    focus_on_activate = true
    vfr = true
    vrr = 1
}
