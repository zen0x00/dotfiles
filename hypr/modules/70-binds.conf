###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

# Core app and window controls
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, W, killactive,
bind = $mainMod SHIFT, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, B, exec, $browser
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, P, pseudo,
bind = $mainMod, J, layoutmsg, togglesplit
bind = $mainMod, T, togglefloating,
bind = $mainMod SHIFT, T, centerwindow,
bind = $mainMod SHIFT, P, pin,

# Shell surfaces
bind = SUPER, SPACE, exec, quickshell ipc call shell toggleLauncher
bind = SUPER SHIFT, SPACE, exec, quickshell ipc call shell toggleThemeMenu
bind = SUPER SHIFT, C, exec, code
bind = SUPER SHIFT, ESCAPE, exec, quickshell ipc call shell togglePowerMenu

# Focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, exec, hyprshot -m region | satty --filename -
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Mouse window manipulation
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Hardware keys
bindel = ,XF86AudioRaiseVolume, exec, sh -c "wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+ >/dev/null 2>&1 && value=\$(wpctl get-volume @DEFAULT_AUDIO_SINK@ 2>/dev/null | awk '{if (\$3 == \"[MUTED]\") print 0; else if (\$2 != \"\") print \$2; else print 0}') && quickshell ipc call shell refreshAudio >/dev/null 2>&1 && quickshell ipc call shell volume \"\$value\" >/dev/null 2>&1"
bindel = ,XF86AudioLowerVolume, exec, sh -c "wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- >/dev/null 2>&1 && value=\$(wpctl get-volume @DEFAULT_AUDIO_SINK@ 2>/dev/null | awk '{if (\$3 == \"[MUTED]\") print 0; else if (\$2 != \"\") print \$2; else print 0}') && quickshell ipc call shell refreshAudio >/dev/null 2>&1 && quickshell ipc call shell volume \"\$value\" >/dev/null 2>&1"
bindel = ,XF86AudioMute, exec, sh -c "wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle >/dev/null 2>&1 && value=\$(wpctl get-volume @DEFAULT_AUDIO_SINK@ 2>/dev/null | awk '{if (\$3 == \"[MUTED]\") print 0; else if (\$2 != \"\") print \$2; else print 0}') && quickshell ipc call shell refreshAudio >/dev/null 2>&1 && quickshell ipc call shell volume \"\$value\" >/dev/null 2>&1"
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Media keys
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
