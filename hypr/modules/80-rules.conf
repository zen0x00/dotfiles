##############################
### WINDOWS AND WORKSPACES ###
##############################

layerrule {
    name = blur-ags
    match:namespace = zen0x

    blur = true
    ignore_alpha = 0.5
}

layerrule {
    name = blur-swaync-cc
    match:namespace = swaync-control-center

    blur = true
    ignore_alpha = 0.6
}

layerrule {
    name = blur-swaync-notif
    match:namespace = swaync-notification-window

    blur = true
    ignore_alpha = 0.5
}

windowrule {
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    name = polished-common-dialogs
    match:title = ^(Open|Save|Save As|Choose|Select|File Upload)(.*)$

    float = true
    center = true
    size = 60% 65%
    opacity = 0.98 0.94
}

windowrule {
    name = polished-picture-in-picture
    match:title = ^(Picture-in-Picture|Picture in picture)$

    float = true
    pin = true
    size = 30% 30%
    move = 69% 64%
    opacity = 0.96 0.90
}

windowrule {
    name = airy-floating-windows
    match:float = true

    rounding = 0
    border_size = 3
    opacity = 0.97 0.92
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

windowrule {
    name = fix-marvelrivals-artifacts
    match:class = ^marvelrivals_launcher.exe$

    no_shadow = true
    no_blur = true
    no_dim = true
    border_size = 0
    rounding = 0
}

# Float Steam
windowrule = float on, match:class steam
windowrule = center on, match:class steam, match:title Steam
windowrule = tag -default-opacity, match:class steam.*
windowrule = opacity 1 1, match:class steam.*
windowrule = size 1400 800, match:class steam, match:title Steam
windowrule = size 460 800, match:class steam, match:title Friends List
windowrule = idle_inhibit fullscreen, match:class steam

# Remove 1px border around hyprshot screenshots
layerrule = no_anim on, match:namespace selection

windowrule {
    name = float-files
    match:class = ^(org.gnome.Nautilus)$
    match:fullscreen = false

    float = true
    center = true
    size = 1100 700
}

windowrule {
    name = float-vlc
    match:class = ^(vlc|VLC)$

    float = true
    center = true
    size = 1280 720
}

windowrule {
    name = float-unityhub
    match:class = ^(unityhub)$
    match:fullscreen = false

    float = true
    center = true
    size = 1100 700
}

windowrule {
    name = move-hyprland-run
    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

# ── Workspace assignments ────────────────────────────────

windowrule {
    name = ws1-zen-browser
    match:class = ^(zen|Zen)$

    workspace = 1
}

windowrule {
    name = ws2-terminal
    match:class = ^(kitty|Kitty|Alacritty|WezTerm|foot)$

    workspace = 2
}

windowrule {
    name = ws3-vscode
    match:class = ^(code|Code|vscode|VSCode)$

    workspace = 3
}

windowrule {
    name = ws4-unity
    match:class = ^(unityhub|Unity)

    workspace = 4
}

windowrule {
    name = ws5-steam-heroic
    match:class = ^(steam|Steam|heroic|Heroic)$

    workspace = 5
}

windowrule {
    name = ws6-games
    match:title = ^(.*\.exe|.*game|.*Game)$

    workspace = 6
}
