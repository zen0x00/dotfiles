source = colors.conf

general {
    gaps_in = 2
    gaps_out = 4
    border_size = 1
    col.active_border = $activeBorderColor
    col.inactive_border = rgba(595959aa)
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 0
    rounding_power = 0
    active_opacity = 1
    inactive_opacity = 1

    shadow {
        enabled = false
    }

    blur {
        enabled = false
    }
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = true
}

dwindle  {
  pseudotile = true
  force_split = 2
  preserve_split = true
}

master {
  allow_small_split = true
  new_status = master
  new_on_top = off
  new_on_active = before
  drop_at_cursor = on
  always_keep_position = off
}

scrolling {
  fullscreen_on_one_column = true
  column_width = 1
  focus_fit_method = 1
  follow_focus = true
}
